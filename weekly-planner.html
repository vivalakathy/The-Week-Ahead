<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="color-scheme" content="light only" />
<meta name="theme-color" content="#f5f1e8" />
<title>Weekly Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: light only;
    --paper: #f5f1e8;
    --paper-shadow: #ebe4d3;
    --ink: #1f1a14;
    --ink-soft: #574e42;
    --ink-faint: #9a907e;
    --rule: #c9c0ad;
    --weekend: #ece6d6;
    --weekend-deeper: #e3dcc8;
    --accent-green: #4a7c4e;
    --accent-red: #a04848;
    --accent-amber: #000000;
    --notepad: #fbf8ef;
    --notepad-border: #d4cab4;
  }

  @media (prefers-color-scheme: dark) {
    :root { color-scheme: light only; }
  }

  /* iOS zoom fix: Safari zooms into any input with font-size < 16px on focus.
     Target iOS specifically and force 16px to defeat the auto-zoom. */
  @supports (-webkit-touch-callout: none) {
    .task-input,
    .bullet-input,
    .notepad-header {
      font-size: 16px !important;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { background: #f5f1e8 !important; }

  body {
    background: #f5f1e8 !important;
    color: #1f1a14 !important;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(87, 78, 66, 0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(74, 124, 78, 0.03) 0%, transparent 50%) !important;
    padding: 8px 24px 80px;
  }

  .page { max-width: 1100px; margin: 0 auto; }

  /* Header */
  .header { text-align: center; margin-bottom: 16px; }
  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 38px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #1f1a14 !important;
  }
  .header .ornament {
    display: flex; align-items: center; justify-content: center;
    gap: 16px; margin-top: 8px;
  }
  .header .ornament-line { width: 60px; height: 1px; background: #574e42; }
  .header .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: #574e42 !important;
    letter-spacing: 0.05em;
  }

  /* Nav */
  .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 12px; }
  .nav-arrow {
    background: none; border: 1px solid var(--rule);
    color: #1f1a14; width: 36px; height: 36px; border-radius: 50%;
    cursor: pointer; font-size: 16px;
    font-family: 'Cormorant Garamond', serif;
    transition: all 0.2s ease; flex-shrink: 0;
  }
  .nav-arrow:hover { background: #1f1a14; color: var(--paper); border-color: #1f1a14; }
  .nav-range {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 19px; color: #574e42; flex: 1; text-align: center;
  }
  .nav-today {
    background: none; border: none;
    border-bottom: 1px solid var(--ink-faint);
    color: #574e42;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 14px; padding: 4px 8px; cursor: pointer;
    letter-spacing: 0.05em;
    transition: color 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .nav-today:hover { color: #1f1a14; border-color: #1f1a14; }

  /* Tracker */
  .tracker {
    background: var(--paper); border: 1px solid var(--rule);
    box-shadow: 0 1px 0 var(--paper-shadow), 0 8px 24px rgba(31, 26, 20, 0.05);
    margin-bottom: 32px;
  }

  .tracker-head, .day-row {
    display: grid;
    grid-template-columns: 36px 1fr 1px 1fr;
    align-items: stretch;
  }

  .tracker-head {
    border-bottom: 1px solid var(--ink-soft);
    padding: 12px 0;
  }
  .tracker-head > div {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 16px; color: #574e42;
    letter-spacing: 0.08em; padding: 0 16px; text-align: center;
  }
  .tracker-head .col-date { text-align: left; padding-left: 5px; }
  .tracker-head .col-spacer { background: var(--rule); padding: 0; }

  .day-row {
    border-bottom: 1px solid var(--rule);
    min-height: 52px;
    transition: background 0.15s ease;
  }
  .day-row:last-child { border-bottom: none; }
  .day-row.weekend { background: var(--weekend); }
  .day-row.today { box-shadow: inset 3px 0 0 var(--accent-amber); }
  .day-row.week-end { border-bottom: 1px dashed #574e42; }

  .day-cell {
    padding: 10px 2px 10px 5px;
    display: flex; align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px; color: #1f1a14;
    letter-spacing: 0; overflow: hidden;
    line-height: 1.2;
  }
  .day-cell .dow { font-weight: 500; margin-right: 2px; color: #574e42; }

  .col-divider { background: var(--rule); }

  .task-cell {
    padding: 6px 14px;
    display: flex; flex-direction: column;
    gap: 4px; min-width: 0; overflow: hidden;
  }

  .task {
    display: flex; align-items: center;
    gap: 8px; width: 100%; min-width: 0;
  }

  .task-input {
    flex: 1 1 auto; min-width: 0; width: 100%;
    background: transparent; border: none; outline: none;
    font-family: 'Inter', sans-serif; font-size: 14px;
    color: #1f1a14; padding: 5px 0;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }
  .task-input:focus { border-bottom-color: var(--ink-faint); }
  .task-input::placeholder { color: var(--ink-faint); font-style: italic; }
  .task-input.done-yes { color: var(--accent-green); }
  .task-input.done-no {
    color: var(--ink-faint);
    text-decoration: line-through;
    text-decoration-color: var(--accent-red);
    text-decoration-thickness: 1px;
  }

  .check-group {
    display: flex; gap: 3px; flex-shrink: 0;
  }

  .check-btn {
    background: none; border: 1px solid var(--rule);
    width: 18px; height: 18px; border-radius: 3px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; line-height: 1;
    color: var(--ink-faint);
    transition: all 0.15s ease;
    padding: 0;
  }
  .check-btn:hover { border-color: #574e42; color: #1f1a14; }
  .check-btn.yes { background: var(--accent-green); border-color: var(--accent-green); color: var(--paper); }
  .check-btn.no { background: var(--accent-red); border-color: var(--accent-red); color: var(--paper); }

  .delete-btn {
    background: none; border: none;
    color: var(--ink-faint); cursor: pointer;
    font-size: 16px; padding: 0 2px;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
    line-height: 1; flex-shrink: 0;
  }
  .task:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--accent-red); }

  .add-task {
    background: none; border: none;
    color: var(--ink-faint);
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 13px; padding: 2px 0; cursor: pointer;
    text-align: left; align-self: flex-start;
    transition: color 0.2s;
  }
  .add-task:hover { color: #574e42; }

  /* Notes & Goals header */
  .notepads-header {
    text-align: center; margin-bottom: 18px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .notepads-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700; font-size: 28px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: #1f1a14 !important;
  }
  .notepads-header .ornament { display: flex; align-items: center; gap: 12px; }
  .notepads-header .ornament-line { width: 40px; height: 1px; background: #574e42; }
  .notepads-header .ornament-dot { width: 4px; height: 4px; background: #574e42; border-radius: 50%; }

  /* Notepads grid */
  .notepads-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

  .notepad {
    background: var(--notepad);
    border: 1px solid var(--notepad-border);
    padding: 16px 18px 14px;
    min-height: 220px;
    display: flex; flex-direction: column;
    box-shadow: 0 1px 0 var(--paper-shadow), 0 4px 12px rgba(31, 26, 20, 0.04);
    position: relative;
  }

  .notepad-remove {
    position: absolute; top: 4px; right: 6px;
    background: none; border: none;
    color: var(--ink-faint); cursor: pointer;
    font-size: 20px; line-height: 1;
    padding: 4px 8px;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
    z-index: 2;
  }
  .notepad:hover .notepad-remove,
  .notepad-remove:focus { opacity: 1; }
  .notepad-remove:hover { color: var(--accent-red); }

  .notepad-header {
    background: transparent; border: none; outline: none;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600; font-size: 19px; color: #1f1a14;
    padding: 0 24px 10px 0;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--notepad-border);
    letter-spacing: 0.05em; width: 100%;
  }
  .notepad-header::placeholder {
    color: var(--ink-faint); font-style: italic; font-weight: 400;
  }

  /* Two-column body inside each notepad */
  .notepad-body {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    gap: 10px;
  }
  .notepad-col { display: flex; flex-direction: column; min-width: 0; }
  .notepad-col-divider { background: var(--notepad-border); opacity: 0.6; }

  .notepad-bullets { display: flex; flex-direction: column; gap: 2px; }

  .bullet { display: flex; align-items: flex-start; gap: 6px; padding: 1px 0; }
  .bullet-marker {
    color: #574e42; font-size: 14px; line-height: 1.6;
    flex-shrink: 0; user-select: none;
  }
  .bullet-input {
    flex: 1; min-width: 0;
    background: transparent; border: none; outline: none;
    font-family: 'Inter', sans-serif;
    font-size: 13px; color: #1f1a14;
    line-height: 1.5; padding: 0;
    resize: none; overflow: hidden;
    min-height: 1.5em;
  }
  .bullet-input::placeholder { color: var(--ink-faint); font-style: italic; }
  .bullet-input.done-yes { color: var(--accent-green); }
  .bullet-input.done-no {
    color: var(--ink-faint);
    text-decoration: line-through;
    text-decoration-color: var(--accent-red);
    text-decoration-thickness: 1px;
  }
  .bullet-checks {
    display: flex; gap: 3px; flex-shrink: 0;
    margin-top: 2px;
  }
  .bullet-check {
    background: none; border: 1px solid var(--notepad-border);
    width: 16px; height: 16px; border-radius: 3px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; line-height: 1;
    color: var(--ink-faint);
    transition: all 0.15s ease;
    padding: 0;
  }
  .bullet-check:hover { border-color: #574e42; color: #1f1a14; }
  .bullet-check.yes { background: var(--accent-green); border-color: var(--accent-green); color: var(--paper); }
  .bullet-check.no { background: var(--accent-red); border-color: var(--accent-red); color: var(--paper); }

  .bullet-delete {
    background: none; border: none;
    color: var(--ink-faint); cursor: pointer;
    font-size: 13px; padding: 0 2px;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
    line-height: 1.5; flex-shrink: 0;
  }
  .bullet:hover .bullet-delete { opacity: 1; }
  .bullet-delete:hover { color: var(--accent-red); }

  .add-bullet {
    background: none; border: none;
    color: var(--ink-faint);
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 12px; padding: 4px 0 0; cursor: pointer;
    text-align: left; align-self: flex-start;
    transition: color 0.2s;
  }
  .add-bullet:hover { color: #574e42; }

  .notepad-controls { display: flex; justify-content: center; margin-top: 28px; }
  .notepad-add-btn {
    background: none;
    border: 1px dashed var(--ink-faint);
    color: #574e42;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 15px; padding: 10px 28px; cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s ease;
    border-radius: 2px;
  }
  .notepad-add-btn:hover {
    border-color: #1f1a14; border-style: solid;
    color: #1f1a14; background: var(--notepad);
  }

  .footer {
    text-align: center; margin-top: 48px;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 13px; color: var(--ink-faint);
    letter-spacing: 0.05em;
  }

  /* Toast confirm */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: #1f1a14;
    color: var(--paper);
    padding: 14px 20px;
    border-radius: 4px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    display: flex; gap: 12px; align-items: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .toast.show { opacity: 1; pointer-events: auto; }
  .toast button {
    background: none;
    border: 1px solid rgba(245, 241, 232, 0.3);
    color: var(--paper);
    padding: 5px 12px;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }
  .toast button.confirm { background: var(--accent-red); border-color: var(--accent-red); }
  .toast button:hover { opacity: 0.85; }

  @media (max-width: 900px) {
    body { padding: 8px 12px 48px; }
    .header h1 { font-size: 30px; letter-spacing: 0.1em; }
    .header .subtitle { font-size: 15px; }
    .tracker-head, .day-row { grid-template-columns: 32px 1fr 1px 1fr; }
    .day-cell { padding: 8px 2px 8px 5px; font-size: 8px; }
    .task-cell { padding: 5px 8px; }
    .task-input { font-size: 13px; }
    .tracker-head > div { font-size: 14px; padding: 0 8px; }
    .notepads-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .notepads-grid { grid-template-columns: 1fr; }
    .nav-range { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <h1>The Week Ahead</h1>
    <div class="ornament">
      <span class="ornament-line"></span>
      <span class="subtitle">you're gonna crush it</span>
      <span class="ornament-line"></span>
    </div>
  </header>

  <nav class="nav">
    <button class="nav-arrow" id="prevWeeks" title="Previous 3 weeks">‹</button>
    <div class="nav-range" id="weekRange"></div>
    <button class="nav-today" id="goToday">return to today</button>
    <button class="nav-arrow" id="nextWeeks" title="Next 3 weeks">›</button>
  </nav>

  <section class="tracker">
    <div class="tracker-head">
      <div class="col-date"></div>
      <div>morning</div>
      <div class="col-spacer"></div>
      <div>evening</div>
    </div>
    <div id="dayRows"></div>
  </section>

  <header class="notepads-header">
    <h2>Notes &amp; Goals</h2>
    <div class="ornament">
      <span class="ornament-line"></span>
      <span class="ornament-dot"></span>
      <span class="ornament-line"></span>
    </div>
  </header>

  <section class="notepads-grid" id="notepads"></section>
  <div class="notepad-controls">
    <button id="addNotepad" class="notepad-add-btn">+ add a block</button>
  </div>

  <div class="footer" id="footer">saved automatically</div>

</div>

<div class="toast" id="toast" role="dialog" aria-live="polite">
  <span id="toastMsg">Remove this block?</span>
  <button id="toastCancel">Cancel</button>
  <button id="toastConfirm" class="confirm">Remove</button>
</div>

<script>
  // ===== Storage =====
  const STORAGE_KEY_TASKS = 'planner.tasks.v1';
  const STORAGE_KEY_NOTEPADS = 'planner.notepads.v3';

  const hasWindowStorage =
    typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function';

  async function loadData(key, fallback) {
    if (hasWindowStorage) {
      try {
        const result = await window.storage.get(key);
        if (result && result.value) return JSON.parse(result.value);
      } catch (e) {}
    }
    try {
      const raw = localStorage.getItem(key);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return fallback;
  }

  async function saveData(key, value) {
    const serialized = JSON.stringify(value);
    let saved = false;
    if (hasWindowStorage) {
      try {
        await window.storage.set(key, serialized);
        saved = true;
      } catch (e) {}
    }
    if (!saved) {
      try { localStorage.setItem(key, serialized); } catch (e) {}
    }
  }

  function debounce(fn, ms) {
    let t;
    return (...args) => {
      clearTimeout(t);
      t = setTimeout(() => fn(...args), ms);
    };
  }

  let tasksState = {};
  let notepadsState = [];

  const saveTasks = debounce(() => saveData(STORAGE_KEY_TASKS, tasksState), 400);
  const saveNotepads = debounce(() => saveData(STORAGE_KEY_NOTEPADS, notepadsState), 400);

  // ===== Date helpers =====
  function startOfWeek(d) {
    const date = new Date(d);
    const day = date.getDay();
    const diff = (day === 0 ? -6 : 1 - day);
    date.setDate(date.getDate() + diff);
    date.setHours(0,0,0,0);
    return date;
  }
  function fmtKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function fmtMonthDay(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
  function fmtRange(start, end) {
    const sm = start.toLocaleString('en-US', { month: 'short' });
    const em = end.toLocaleString('en-US', { month: 'short' });
    if (sm === em) return `${sm} ${start.getDate()} — ${end.getDate()}, ${end.getFullYear()}`;
    return `${sm} ${start.getDate()} — ${em} ${end.getDate()}, ${end.getFullYear()}`;
  }
  const DOW = ['M','T','W','R','F','S','S'];
  const isWeekend = i => i === 5 || i === 6;
  const isSunday = i => i === 6;

  let anchorMonday = startOfWeek(new Date());

  function shiftWeeks(delta) {
    anchorMonday = new Date(anchorMonday);
    anchorMonday.setDate(anchorMonday.getDate() + delta * 7);
    render();
  }

  // ===== Tracker =====
  function ensureDay(key) {
    if (!tasksState[key]) tasksState[key] = { morning: [], evening: [] };
    if (!Array.isArray(tasksState[key].morning)) tasksState[key].morning = [];
    if (!Array.isArray(tasksState[key].evening)) tasksState[key].evening = [];
    return tasksState[key];
  }

  function render() {
    const days = [];
    const start = new Date(anchorMonday);
    for (let w = 0; w < 3; w++) {
      for (let i = 0; i < 7; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + w*7 + i);
        days.push({ date: d, dowIdx: i, isLastOfWeek: i === 6 && w < 2 });
      }
    }
    const last = days[days.length - 1].date;
    document.getElementById('weekRange').textContent = fmtRange(anchorMonday, last);

    const todayKey = fmtKey(new Date());
    const container = document.getElementById('dayRows');
    container.innerHTML = '';

    days.forEach((entry) => {
      const row = document.createElement('div');
      row.className = 'day-row';
      if (isWeekend(entry.dowIdx)) row.classList.add('weekend');
      if (isSunday(entry.dowIdx)) row.classList.add('sunday');
      if (entry.isLastOfWeek) row.classList.add('week-end');
      const key = fmtKey(entry.date);
      if (key === todayKey) row.classList.add('today');

      const dayCell = document.createElement('div');
      dayCell.className = 'day-cell';
      dayCell.innerHTML = `<span class="dow">${DOW[entry.dowIdx]}</span><span class="date">${fmtMonthDay(entry.date)}</span>`;
      row.appendChild(dayCell);

      row.appendChild(buildTaskCell(key, 'morning'));

      const div = document.createElement('div');
      div.className = 'col-divider';
      row.appendChild(div);

      row.appendChild(buildTaskCell(key, 'evening'));

      container.appendChild(row);
    });
  }

  function buildTaskCell(key, period) {
    const cell = document.createElement('div');
    cell.className = 'task-cell';
    const day = ensureDay(key);
    const list = day[period];

    list.forEach((_, i) => cell.appendChild(buildTaskRow(key, period, i)));

    const addBtn = document.createElement('button');
    addBtn.className = 'add-task';
    addBtn.textContent = list.length === 0 ? '+ add' : '+ another';
    addBtn.onclick = () => {
      day[period].push({ text: '', status: null });
      saveTasks();
      render();
      requestAnimationFrame(() => {
        const inputs = document.querySelectorAll(`.task-input[data-key="${key}"][data-period="${period}"]`);
        if (inputs.length) inputs[inputs.length - 1].focus();
      });
    };
    cell.appendChild(addBtn);
    return cell;
  }

  function buildTaskRow(key, period, index) {
    const task = tasksState[key][period][index];
    const wrap = document.createElement('div');
    wrap.className = 'task';
    if (task.status) wrap.classList.add('has-status');

    // INPUT (left)
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'task-input';
    if (task.status === 'yes') input.classList.add('done-yes');
    if (task.status === 'no') input.classList.add('done-no');
    input.value = task.text;
    input.dataset.key = key;
    input.dataset.period = period;
    input.oninput = (e) => {
      task.text = e.target.value;
      saveTasks();
    };
    input.onkeydown = (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        tasksState[key][period].push({ text: '', status: null });
        saveTasks();
        render();
        requestAnimationFrame(() => {
          const inputs = document.querySelectorAll(`.task-input[data-key="${key}"][data-period="${period}"]`);
          if (inputs.length) inputs[inputs.length - 1].focus();
        });
      } else if (e.key === 'Backspace' && task.text === '' && tasksState[key][period].length > 1) {
        e.preventDefault();
        tasksState[key][period].splice(index, 1);
        saveTasks();
        render();
      }
    };
    wrap.appendChild(input);

    // CHECK BUTTONS (right)
    const group = document.createElement('div');
    group.className = 'check-group';

    const yesBtn = document.createElement('button');
    yesBtn.className = 'check-btn' + (task.status === 'yes' ? ' yes' : '');
    yesBtn.textContent = '✓';
    yesBtn.title = 'Did it';
    yesBtn.onclick = () => {
      task.status = task.status === 'yes' ? null : 'yes';
      saveTasks();
      render();
    };

    const noBtn = document.createElement('button');
    noBtn.className = 'check-btn' + (task.status === 'no' ? ' no' : '');
    noBtn.textContent = '✕';
    noBtn.title = 'Did not';
    noBtn.onclick = () => {
      task.status = task.status === 'no' ? null : 'no';
      saveTasks();
      render();
    };

    group.appendChild(yesBtn);
    group.appendChild(noBtn);
    wrap.appendChild(group);

    // DELETE (far right)
    const del = document.createElement('button');
    del.className = 'delete-btn';
    del.innerHTML = '×';
    del.title = 'Remove task';
    del.onclick = () => {
      const preview = task.text.trim().length
        ? `Delete "${task.text.trim().slice(0, 30)}${task.text.trim().length > 30 ? '…' : ''}"?`
        : 'Delete this task?';
      showToast(preview, () => {
        tasksState[key][period].splice(index, 1);
        saveTasks();
        render();
      });
    };
    wrap.appendChild(del);

    return wrap;
  }

  // ===== Notepads (with two columns each) =====
  function makeBullet(text) {
    return { text: text || '', status: null };
  }

  function makeEmptyNotepad() {
    return {
      header: '',
      columns: [
        { bullets: [makeBullet('')] },
        { bullets: [makeBullet('')] }
      ]
    };
  }

  function ensureNotepadShape(n) {
    if (!n || typeof n !== 'object') return makeEmptyNotepad();
    if (typeof n.header !== 'string') n.header = '';
    if (!Array.isArray(n.columns)) {
      const oldBullets = Array.isArray(n.bullets) && n.bullets.length ? n.bullets : [''];
      n.columns = [
        { bullets: oldBullets },
        { bullets: [''] }
      ];
      delete n.bullets;
    }
    while (n.columns.length < 2) {
      n.columns.push({ bullets: [''] });
    }
    n.columns.forEach((c) => {
      // remove the no-longer-used label
      delete c.label;
      if (!Array.isArray(c.bullets) || c.bullets.length === 0) c.bullets = [makeBullet('')];
      // migrate string bullets to object bullets
      c.bullets = c.bullets.map(b => {
        if (typeof b === 'string') return makeBullet(b);
        if (b && typeof b === 'object') {
          if (typeof b.text !== 'string') b.text = '';
          if (b.status !== 'yes' && b.status !== 'no') b.status = null;
          return b;
        }
        return makeBullet('');
      });
    });
    return n;
  }

  function renderNotepads() {
    const grid = document.getElementById('notepads');
    grid.innerHTML = '';

    if (!Array.isArray(notepadsState)) notepadsState = [];
    if (notepadsState.length === 0) notepadsState.push(makeEmptyNotepad());

    notepadsState.forEach((rawNote, i) => {
      const note = ensureNotepadShape(rawNote);
      notepadsState[i] = note;

      const pad = document.createElement('div');
      pad.className = 'notepad';

      // Remove block button
      const removeBtn = document.createElement('button');
      removeBtn.className = 'notepad-remove';
      removeBtn.innerHTML = '×';
      removeBtn.title = 'Remove this block';
      removeBtn.onclick = (e) => {
        e.stopPropagation();
        showToast('Remove this block and its contents?', () => {
          notepadsState.splice(i, 1);
          saveNotepads();
          renderNotepads();
        });
      };
      pad.appendChild(removeBtn);

      // Header
      const header = document.createElement('input');
      header.type = 'text';
      header.className = 'notepad-header';
      header.placeholder = 'Category';
      header.value = note.header;
      header.oninput = (e) => {
        note.header = e.target.value;
        saveNotepads();
      };
      pad.appendChild(header);

      // Two-column body
      const body = document.createElement('div');
      body.className = 'notepad-body';

      body.appendChild(buildNotepadColumn(i, 0));

      const colDiv = document.createElement('div');
      colDiv.className = 'notepad-col-divider';
      body.appendChild(colDiv);

      body.appendChild(buildNotepadColumn(i, 1));

      pad.appendChild(body);

      grid.appendChild(pad);
    });
  }

  function buildNotepadColumn(noteIdx, colIdx) {
    const col = notepadsState[noteIdx].columns[colIdx];
    const wrap = document.createElement('div');
    wrap.className = 'notepad-col';

    const bulletsWrap = document.createElement('div');
    bulletsWrap.className = 'notepad-bullets';
    col.bullets.forEach((_, bi) => bulletsWrap.appendChild(buildBullet(noteIdx, colIdx, bi)));
    wrap.appendChild(bulletsWrap);

    const addBtn = document.createElement('button');
    addBtn.className = 'add-bullet';
    addBtn.textContent = '+ add';
    addBtn.onclick = () => {
      col.bullets.push(makeBullet(''));
      saveNotepads();
      renderNotepads();
      requestAnimationFrame(() => {
        const grid = document.getElementById('notepads');
        const pads = grid.querySelectorAll('.notepad');
        const cols = pads[noteIdx].querySelectorAll('.notepad-col');
        const inputs = cols[colIdx].querySelectorAll('.bullet-input');
        if (inputs.length) inputs[inputs.length - 1].focus();
      });
    };
    wrap.appendChild(addBtn);

    return wrap;
  }

  function buildBullet(noteIdx, colIdx, bulletIdx) {
    const col = notepadsState[noteIdx].columns[colIdx];
    const bullet = col.bullets[bulletIdx];
    const wrap = document.createElement('div');
    wrap.className = 'bullet';
    if (bullet.status) wrap.classList.add('has-status');

    const marker = document.createElement('span');
    marker.className = 'bullet-marker';
    marker.textContent = '·';
    wrap.appendChild(marker);

    const input = document.createElement('textarea');
    input.className = 'bullet-input';
    if (bullet.status === 'yes') input.classList.add('done-yes');
    if (bullet.status === 'no') input.classList.add('done-no');
    input.rows = 1;
    input.value = bullet.text;

    const autosize = () => {
      input.style.height = 'auto';
      input.style.height = input.scrollHeight + 'px';
    };
    input.oninput = (e) => {
      bullet.text = e.target.value;
      autosize();
      saveNotepads();
    };
    input.onkeydown = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        col.bullets.splice(bulletIdx + 1, 0, makeBullet(''));
        saveNotepads();
        renderNotepads();
        requestAnimationFrame(() => {
          const grid = document.getElementById('notepads');
          const pads = grid.querySelectorAll('.notepad');
          const cols = pads[noteIdx].querySelectorAll('.notepad-col');
          const inputs = cols[colIdx].querySelectorAll('.bullet-input');
          if (inputs[bulletIdx + 1]) inputs[bulletIdx + 1].focus();
        });
      } else if (e.key === 'Backspace' && input.value === '' && col.bullets.length > 1) {
        e.preventDefault();
        col.bullets.splice(bulletIdx, 1);
        saveNotepads();
        renderNotepads();
        requestAnimationFrame(() => {
          const grid = document.getElementById('notepads');
          const pads = grid.querySelectorAll('.notepad');
          const cols = pads[noteIdx].querySelectorAll('.notepad-col');
          const inputs = cols[colIdx].querySelectorAll('.bullet-input');
          const target = inputs[Math.max(0, bulletIdx - 1)];
          if (target) {
            target.focus();
            target.setSelectionRange(target.value.length, target.value.length);
          }
        });
      }
    };
    requestAnimationFrame(autosize);
    wrap.appendChild(input);

    // Check / X buttons (hover-reveal)
    const checks = document.createElement('div');
    checks.className = 'bullet-checks';

    const yesBtn = document.createElement('button');
    yesBtn.className = 'bullet-check' + (bullet.status === 'yes' ? ' yes' : '');
    yesBtn.textContent = '✓';
    yesBtn.title = 'Did it';
    yesBtn.onclick = () => {
      bullet.status = bullet.status === 'yes' ? null : 'yes';
      saveNotepads();
      renderNotepads();
    };

    const noBtn = document.createElement('button');
    noBtn.className = 'bullet-check' + (bullet.status === 'no' ? ' no' : '');
    noBtn.textContent = '✕';
    noBtn.title = 'Did not';
    noBtn.onclick = () => {
      bullet.status = bullet.status === 'no' ? null : 'no';
      saveNotepads();
      renderNotepads();
    };

    checks.appendChild(yesBtn);
    checks.appendChild(noBtn);
    wrap.appendChild(checks);

    const del = document.createElement('button');
    del.className = 'bullet-delete';
    del.innerHTML = '×';
    del.title = 'Remove';
    del.onclick = () => {
      const doDelete = () => {
        if (col.bullets.length > 1) {
          col.bullets.splice(bulletIdx, 1);
        } else {
          col.bullets[0] = makeBullet('');
        }
        saveNotepads();
        renderNotepads();
      };
      const text = (bullet.text || '').trim();
      if (!text) {
        // Empty bullet - no need to confirm
        doDelete();
      } else {
        const preview = `Delete "${text.slice(0, 30)}${text.length > 30 ? '…' : ''}"?`;
        showToast(preview, doDelete);
      }
    };
    wrap.appendChild(del);

    return wrap;
  }

  // ===== Toast confirm =====
  let toastConfirmFn = null;
  const toast = document.getElementById('toast');
  const toastMsg = document.getElementById('toastMsg');
  const toastConfirmBtn = document.getElementById('toastConfirm');
  const toastCancelBtn = document.getElementById('toastCancel');

  function showToast(message, onConfirm) {
    toastMsg.textContent = message;
    toastConfirmFn = onConfirm;
    toast.classList.add('show');
  }
  function hideToast() {
    toast.classList.remove('show');
    toastConfirmFn = null;
  }
  toastConfirmBtn.onclick = () => {
    if (toastConfirmFn) toastConfirmFn();
    hideToast();
  };
  toastCancelBtn.onclick = hideToast;

  // ===== Init =====
  document.getElementById('prevWeeks').onclick = () => shiftWeeks(-3);
  document.getElementById('nextWeeks').onclick = () => shiftWeeks(3);
  document.getElementById('goToday').onclick = () => {
    anchorMonday = startOfWeek(new Date());
    render();
  };
  document.getElementById('addNotepad').onclick = () => {
    if (!Array.isArray(notepadsState)) notepadsState = [];
    notepadsState.push(makeEmptyNotepad());
    saveNotepads();
    renderNotepads();
    requestAnimationFrame(() => {
      const grid = document.getElementById('notepads');
      const pads = grid.querySelectorAll('.notepad');
      const last = pads[pads.length - 1];
      if (last) {
        last.scrollIntoView({ behavior: 'smooth', block: 'center' });
        const h = last.querySelector('.notepad-header');
        if (h) h.focus();
      }
    });
  };

  const todayStr = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  document.getElementById('footer').textContent = `saved automatically · ${todayStr.toLowerCase()}`;

  (async function init() {
    tasksState = await loadData(STORAGE_KEY_TASKS, {});

    let loaded = await loadData(STORAGE_KEY_NOTEPADS, null);
    if (!loaded) {
      // Try previous versions
      let legacy = await loadData('planner.notepads.v2', null);
      if (!legacy) legacy = await loadData('planner.notepads.v1', null);
      if (legacy) {
        const arr = Array.isArray(legacy) ? legacy : Object.values(legacy);
        loaded = arr.map(ensureNotepadShape);
      }
    }
    if (Array.isArray(loaded) && loaded.length > 0) {
      notepadsState = loaded.map(ensureNotepadShape);
    } else {
      notepadsState = Array.from({ length: 6 }, makeEmptyNotepad);
    }
    render();
    renderNotepads();
  })();
</script>
</body>
</html>
