<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="color-scheme" content="light only" />
<meta name="theme-color" content="#f5f1e8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Weekly Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: light only;
    --paper: #f5f1e8;
    --paper-shadow: #ebe4d3;
    --ink: #1f1a14;
    --ink-soft: #574e42;
    --ink-faint: #9a907e;
    --rule: #c9c0ad;
    --weekend: #ece6d6;
    --weekend-deeper: #e3dcc8;
    --accent-green: #4a7c4e;
    --accent-red: #a04848;
    --accent-amber: #000000;
    --notepad: #fbf8ef;
    --notepad-border: #d4cab4;
  }

  @media (prefers-color-scheme: dark) {
    :root { color-scheme: light only; }
  }

  /* iOS zoom fix: Safari zooms into any input with font-size < 16px on focus.
     Target iOS specifically and force 16px to defeat the auto-zoom. */
  @supports (-webkit-touch-callout: none) {
    .task-input,
    .bullet-input,
    .notepad-header {
      font-size: 16px !important;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { background: #f5f1e8 !important; }

  body {
    background: #f5f1e8 !important;
    color: #1f1a14 !important;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(87, 78, 66, 0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(74, 124, 78, 0.03) 0%, transparent 50%) !important;
    padding: 8px 24px 80px;
  }

  .page { max-width: 1100px; margin: 0 auto; }

  /* Header */
  .header { text-align: center; margin-bottom: 16px; }
  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 38px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #1f1a14 !important;
  }
  .header .ornament {
    display: flex; align-items: center; justify-content: center;
    gap: 16px; margin-top: 8px;
  }
  .header .ornament-line { width: 60px; height: 1px; background: #574e42; }
  .header .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: #574e42 !important;
    letter-spacing: 0.05em;
  }

  /* Nav */
  .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 12px; }
  .nav-arrow {
    background: none; border: 1px solid var(--rule);
    color: #1f1a14; width: 36px; height: 36px; border-radius: 50%;
    cursor: pointer; font-size: 16px;
    font-family: 'Cormorant Garamond', serif;
    transition: all 0.2s ease; flex-shrink: 0;
  }
  .nav-arrow:hover { background: #1f1a14; color: var(--paper); border-color: #1f1a14; }
  .nav-range {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 19px; color: #574e42; flex: 1; text-align: center;
  }
  .nav-today {
    background: none; border: none;
    border-bottom: 1px solid var(--ink-faint);
    color: #574e42;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 14px; padding: 4px 8px; cursor: pointer;
    letter-spacing: 0.05em;
    transition: color 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .nav-today:hover { color: #1f1a14; border-color: #1f1a14; }

  /* Tracker */
  .tracker {
    background: var(--paper); border: 1px solid var(--rule);
    box-shadow: 0 1px 0 var(--paper-shadow), 0 8px 24px rgba(31, 26, 20, 0.05);
    margin-bottom: 32px;
  }

  .tracker-head, .day-row {
    display: grid;
    grid-template-columns: 36px 1fr 1px 1fr;
    align-items: stretch;
  }

  .tracker-head {
    border-bottom: 1px solid var(--ink-soft);
    padding: 12px 0;
  }
  .tracker-head > div {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 16px; color: #574e42;
    letter-spacing: 0.08em; padding: 0 16px; text-align: center;
  }
  .tracker-head .col-date { text-align: left; padding-left: 5px; }
  .tracker-head .col-spacer { background: var(--rule); padding: 0; }

  .day-row {
    border-bottom: 1px solid var(--rule);
    min-height: 52px;
    transition: background 0.15s ease;
  }
  .day-row:last-child { border-bottom: none; }
  .day-row.weekend { background: var(--weekend); }
  .day-row.today { box-shadow: inset 3px 0 0 var(--accent-amber); }
  .day-row.week-end { border-bottom: 1px dashed #574e42; }

  .day-cell {
    padding: 10px 2px 10px 5px;
    display: flex; align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px; color: #1f1a14;
    letter-spacing: 0; overflow: hidden;
    line-height: 1.2;
  }
  .day-cell .dow { font-weight: 500; margin-right: 2px; color: #574e42; }

  .col-divider { background: var(--rule); }

  .task-cell {
    padding: 6px 6px 6px 12px;
    display: flex; flex-direction: column;
    gap: 4px; min-width: 0; overflow: hidden;
  }

  .task {
    display: flex; align-items: flex-start;
    gap: 4px; width: 100%; min-width: 0;
  }
  .check-group, .delete-btn {
    margin-top: 6px;
  }

  .task-input {
    flex: 1 1 auto; min-width: 0; width: 100%;
    background: transparent; border: none; outline: none;
    font-family: 'Inter', sans-serif; font-size: 14px;
    color: #1f1a14; padding: 5px 0;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
    resize: none;
    overflow: hidden;
    line-height: 1.4;
    min-height: calc(1.4em + 10px);
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .task-input:focus { border-bottom-color: var(--ink-faint); }
  .task-input::placeholder { color: var(--ink-faint); font-style: italic; }
  .task-input.done-yes { color: var(--accent-green); }
  .task-input.done-no {
    color: var(--ink-faint);
    text-decoration: line-through;
    text-decoration-color: var(--accent-red);
    text-decoration-thickness: 1px;
  }

  .check-group {
    display: flex; gap: 2px; flex-shrink: 0;
  }

  .check-btn {
    background: none; border: 1px solid var(--rule);
    width: 15px; height: 15px; border-radius: 2px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px; line-height: 1;
    color: var(--ink-faint);
    transition: all 0.15s ease;
    padding: 0;
  }
  .check-btn:hover { border-color: #574e42; color: #1f1a14; }
  .check-btn.yes { background: var(--accent-green); border-color: var(--accent-green); color: var(--paper); }
  .check-btn.no { background: var(--accent-red); border-color: var(--accent-red); color: var(--paper); }

  .delete-btn {
    background: none; border: none;
    color: var(--ink-faint); cursor: pointer;
    font-size: 13px; padding: 0;
    width: 12px;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
    line-height: 1; flex-shrink: 0;
  }
  .task:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--accent-red); }

  .add-task {
    background: none; border: none;
    color: var(--ink-faint);
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 13px; padding: 2px 0; cursor: pointer;
    text-align: left; align-self: flex-start;
    transition: color 0.2s;
  }
  .add-task:hover { color: #574e42; }

  /* Notes & Goals header */
  .notepads-header {
    text-align: center; margin-bottom: 18px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .notepads-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700; font-size: 28px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: #1f1a14 !important;
  }
  .notepads-header .ornament { display: flex; align-items: center; gap: 12px; }
  .notepads-header .ornament-line { width: 40px; height: 1px; background: #574e42; }
  .notepads-header .ornament-dot { width: 4px; height: 4px; background: #574e42; border-radius: 50%; }

  /* Notepads grid */
  .notepads-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

  .notepad {
    background: var(--notepad);
    border: 1px solid var(--notepad-border);
    padding: 16px 18px 14px;
    min-height: 220px;
    display: flex; flex-direction: column;
    box-shadow: 0 1px 0 var(--paper-shadow), 0 4px 12px rgba(31, 26, 20, 0.04);
    position: relative;
  }

  .notepad-remove {
    position: absolute; top: 4px; right: 6px;
    background: none; border: none;
    color: var(--ink-faint); cursor: pointer;
    font-size: 20px; line-height: 1;
    padding: 4px 8px;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
    z-index: 2;
  }
  .notepad:hover .notepad-remove,
  .notepad-remove:focus { opacity: 1; }
  .notepad-remove:hover { color: var(--accent-red); }

  .notepad-header {
    background: transparent; border: none; outline: none;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600; font-size: 19px; color: #1f1a14;
    padding: 0 24px 10px 18px;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--notepad-border);
    letter-spacing: 0.05em; width: 100%;
  }
  .notepad-header::placeholder {
    color: var(--ink-faint); font-style: italic; font-weight: 400;
  }

  /* Two-column body inside each notepad */
  .notepad-body {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    gap: 10px;
  }
  .notepad-col { display: flex; flex-direction: column; min-width: 0; }
  .notepad-col-divider { background: var(--notepad-border); opacity: 0.6; }

  .notepad-bullets { display: flex; flex-direction: column; gap: 2px; }

  .bullet { display: flex; align-items: flex-start; gap: 6px; padding: 1px 0; }
  .bullet-marker {
    color: #574e42; font-size: 14px; line-height: 1.6;
    flex-shrink: 0; user-select: none;
  }
  .bullet-input {
    flex: 1; min-width: 0;
    background: transparent; border: none; outline: none;
    font-family: 'Inter', sans-serif;
    font-size: 13px; color: #1f1a14;
    line-height: 1.5; padding: 0;
    resize: none; overflow: hidden;
    min-height: 1.5em;
  }
  .bullet-input::placeholder { color: var(--ink-faint); font-style: italic; }
  .bullet-input.done-yes { color: var(--accent-green); }
  .bullet-input.done-no {
    color: var(--ink-faint);
    text-decoration: line-through;
    text-decoration-color: var(--accent-red);
    text-decoration-thickness: 1px;
  }
  .bullet-checks {
    display: flex; gap: 3px; flex-shrink: 0;
    margin-top: 2px;
  }
  .bullet-check {
    background: none; border: 1px solid var(--notepad-border);
    width: 16px; height: 16px; border-radius: 3px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; line-height: 1;
    color: var(--ink-faint);
    transition: all 0.15s ease;
    padding: 0;
  }
  .bullet-check:hover { border-color: #574e42; color: #1f1a14; }
  .bullet-check.yes { background: var(--accent-green); border-color: var(--accent-green); color: var(--paper); }
  .bullet-check.no { background: var(--accent-red); border-color: var(--accent-red); color: var(--paper); }

  .bullet-delete {
    background: none; border: none;
    color: var(--ink-faint); cursor: pointer;
    font-size: 13px; padding: 0 2px;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
    line-height: 1.5; flex-shrink: 0;
  }
  .bullet:hover .bullet-delete { opacity: 1; }
  .bullet-delete:hover { color: var(--accent-red); }

  .add-bullet {
    background: none; border: none;
    color: var(--ink-faint);
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 12px; padding: 4px 0 0; cursor: pointer;
    text-align: left; align-self: flex-start;
    transition: color 0.2s;
  }
  .add-bullet:hover { color: #574e42; }

  /* Drag handles & states */
  .notepad-drag {
    position: absolute; top: 4px; left: 6px;
    background: none; border: none;
    color: var(--ink-faint); cursor: grab;
    font-size: 14px; line-height: 1;
    padding: 4px 6px;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
    z-index: 2;
    user-select: none;
  }
  .notepad:hover .notepad-drag,
  .notepad-drag:focus { opacity: 1; }
  .notepad-drag:hover { color: #1f1a14; }
  .notepad-drag:active { cursor: grabbing; }

  .notepad.dragging {
    opacity: 0.4;
  }
  .notepad.drag-over {
    box-shadow: 0 0 0 2px var(--accent-amber), 0 1px 0 var(--paper-shadow), 0 4px 12px rgba(31, 26, 20, 0.04);
  }

  .bullet-drag {
    background: none; border: none;
    color: var(--ink-faint); cursor: grab;
    font-size: 13px; line-height: 1.5;
    padding: 0 2px;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
    flex-shrink: 0;
    user-select: none;
  }
  .bullet:hover .bullet-drag { opacity: 0.7; }
  .bullet-drag:hover { opacity: 1 !important; color: #1f1a14; }
  .bullet-drag:active { cursor: grabbing; }

  .bullet.dragging {
    opacity: 0.4;
  }
  .bullet.drag-over-top {
    border-top: 2px solid var(--accent-amber);
    margin-top: -2px;
  }
  .bullet.drag-over-bottom {
    border-bottom: 2px solid var(--accent-amber);
    margin-bottom: -2px;
  }
  .notepad-col.drag-over-empty {
    background: rgba(168, 98, 74, 0.08);
    border-radius: 3px;
  }

  .notepad-controls { display: flex; justify-content: center; margin-top: 28px; }
  .notepad-add-btn {
    background: none;
    border: 1px dashed var(--ink-faint);
    color: #574e42;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 15px; padding: 10px 28px; cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s ease;
    border-radius: 2px;
  }
  .notepad-add-btn:hover {
    border-color: #1f1a14; border-style: solid;
    color: #1f1a14; background: var(--notepad);
  }

  .footer {
    text-align: center; margin-top: 48px;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 13px; color: var(--ink-faint);
    letter-spacing: 0.05em;
  }
  .footer-sep { margin: 0 4px; }
  .footer-btn {
    background: none;
    border: none;
    border-bottom: 1px solid var(--ink-faint);
    color: var(--ink-faint);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.05em;
    cursor: pointer;
    padding: 2px 4px;
    transition: color 0.2s, border-color 0.2s;
  }
  .footer-btn:hover { color: #1f1a14; border-color: #1f1a14; }

  /* Toast confirm */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: #1f1a14;
    color: var(--paper);
    padding: 14px 20px;
    border-radius: 4px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    display: flex; gap: 12px; align-items: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .toast.show { opacity: 1; pointer-events: auto; }
  .toast button {
    background: none;
    border: 1px solid rgba(245, 241, 232, 0.3);
    color: var(--paper);
    padding: 5px 12px;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }
  .toast button.confirm { background: var(--accent-red); border-color: var(--accent-red); }
  .toast button:hover { opacity: 0.85; }

  /* On touch devices, drag handles need to be visible without hover */
  @media (hover: none) {
    .notepad-drag,
    .bullet-drag {
      opacity: 0.5 !important;
    }
    .notepad-remove {
      opacity: 0.5 !important;
    }
    .delete-btn,
    .bullet-delete {
      opacity: 0.6 !important;
    }
  }

  @media (max-width: 900px) {
    body { padding: 8px 12px 48px; }
    .header h1 { font-size: 30px; letter-spacing: 0.1em; }
    .header .subtitle { font-size: 15px; }
    .tracker-head, .day-row { grid-template-columns: 32px 1fr 1px 1fr; }
    .day-cell { padding: 8px 2px 8px 5px; font-size: 8px; }
    .task-cell { padding: 5px 8px; }
    .task-input { font-size: 13px; }
    .tracker-head > div { font-size: 14px; padding: 0 8px; }
    .notepads-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .notepads-grid { grid-template-columns: 1fr; }
    .nav-range { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <h1>The Week Ahead</h1>
    <div class="ornament">
      <span class="ornament-line"></span>
      <span class="subtitle">you're gonna crush it</span>
      <span class="ornament-line"></span>
    </div>
  </header>

  <nav class="nav">
    <button class="nav-arrow" id="prevWeeks" title="Previous week">‹</button>
    <div class="nav-range" id="weekRange"></div>
    <button class="nav-today" id="goToday">return to today</button>
    <button class="nav-arrow" id="nextWeeks" title="Next week">›</button>
  </nav>

  <section class="tracker">
    <div class="tracker-head">
      <div class="col-date"></div>
      <div>morning</div>
      <div class="col-spacer"></div>
      <div>evening</div>
    </div>
    <div id="dayRows"></div>
  </section>

  <header class="notepads-header">
    <h2>Notes &amp; Goals</h2>
    <div class="ornament">
      <span class="ornament-line"></span>
      <span class="ornament-dot"></span>
      <span class="ornament-line"></span>
    </div>
  </header>

  <section class="notepads-grid" id="notepads"></section>
  <div class="notepad-controls">
    <button id="addNotepad" class="notepad-add-btn">+ add a block</button>
  </div>

  <div class="footer" id="footer">
    <span id="footerText">saved automatically</span>
    <span class="footer-sep"> · </span>
    <button id="refreshBtn" class="footer-btn" title="Check for updates">check for updates</button>
  </div>

</div>

<div class="toast" id="toast" role="dialog" aria-live="polite">
  <span id="toastMsg">Remove this block?</span>
  <button id="toastCancel">Cancel</button>
  <button id="toastConfirm" class="confirm">Remove</button>
</div>

<script>
  // ===== Version + manual refresh =====
  // Bumped any time the file is updated.
  const APP_VERSION = '2026-05-03-1';

  async function forceRefresh() {
    try {
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
    } catch (e) {}
    const url = new URL(window.location.href);
    url.searchParams.set('v', Date.now().toString());
    window.location.replace(url.toString());
  }

  // ===== Storage =====
  const STORAGE_KEY_TASKS = 'planner.tasks.v1';
  const STORAGE_KEY_NOTEPADS = 'planner.notepads.v3';

  const hasWindowStorage =
    typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function';

  async function loadData(key, fallback) {
    if (hasWindowStorage) {
      try {
        const result = await window.storage.get(key);
        if (result && result.value) return JSON.parse(result.value);
      } catch (e) {}
    }
    try {
      const raw = localStorage.getItem(key);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return fallback;
  }

  async function saveData(key, value) {
    const serialized = JSON.stringify(value);
    let saved = false;
    if (hasWindowStorage) {
      try {
        await window.storage.set(key, serialized);
        saved = true;
      } catch (e) {}
    }
    if (!saved) {
      try { localStorage.setItem(key, serialized); } catch (e) {}
    }
  }

  function debounce(fn, ms) {
    let t;
    return (...args) => {
      clearTimeout(t);
      t = setTimeout(() => fn(...args), ms);
    };
  }

  let tasksState = {};
  let notepadsState = [];

  const saveTasks = debounce(() => saveData(STORAGE_KEY_TASKS, tasksState), 400);
  const saveNotepads = debounce(() => saveData(STORAGE_KEY_NOTEPADS, notepadsState), 400);

  // ===== Date helpers =====
  function startOfWeek(d) {
    const date = new Date(d);
    const day = date.getDay();
    const diff = (day === 0 ? -6 : 1 - day);
    date.setDate(date.getDate() + diff);
    date.setHours(0,0,0,0);
    return date;
  }
  function fmtKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function fmtMonthDay(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
  function fmtRange(start, end) {
    const sm = start.toLocaleString('en-US', { month: 'short' });
    const em = end.toLocaleString('en-US', { month: 'short' });
    if (sm === em) return `${sm} ${start.getDate()} — ${end.getDate()}, ${end.getFullYear()}`;
    return `${sm} ${start.getDate()} — ${em} ${end.getDate()}, ${end.getFullYear()}`;
  }
  const DOW = ['M','T','W','R','F','S','S'];
  const isWeekend = i => i === 5 || i === 6;
  const isSunday = i => i === 6;

  let anchorMonday = startOfWeek(new Date());

  function shiftWeeks(delta) {
    anchorMonday = new Date(anchorMonday);
    anchorMonday.setDate(anchorMonday.getDate() + delta * 7);
    render();
  }

  // ===== Tracker =====
  function ensureDay(key) {
    if (!tasksState[key]) tasksState[key] = { morning: [], evening: [] };
    if (!Array.isArray(tasksState[key].morning)) tasksState[key].morning = [];
    if (!Array.isArray(tasksState[key].evening)) tasksState[key].evening = [];
    return tasksState[key];
  }

  function render() {
    const days = [];
    const start = new Date(anchorMonday);
    for (let w = 0; w < 3; w++) {
      for (let i = 0; i < 7; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + w*7 + i);
        days.push({ date: d, dowIdx: i, isLastOfWeek: i === 6 && w < 2 });
      }
    }
    const last = days[days.length - 1].date;
    document.getElementById('weekRange').textContent = fmtRange(anchorMonday, last);

    const todayKey = fmtKey(new Date());
    const container = document.getElementById('dayRows');
    container.innerHTML = '';

    days.forEach((entry) => {
      const row = document.createElement('div');
      row.className = 'day-row';
      if (isWeekend(entry.dowIdx)) row.classList.add('weekend');
      if (isSunday(entry.dowIdx)) row.classList.add('sunday');
      if (entry.isLastOfWeek) row.classList.add('week-end');
      const key = fmtKey(entry.date);
      if (key === todayKey) row.classList.add('today');

      const dayCell = document.createElement('div');
      dayCell.className = 'day-cell';
      dayCell.innerHTML = `<span class="dow">${DOW[entry.dowIdx]}</span><span class="date">${fmtMonthDay(entry.date)}</span>`;
      row.appendChild(dayCell);

      row.appendChild(buildTaskCell(key, 'morning'));

      const div = document.createElement('div');
      div.className = 'col-divider';
      row.appendChild(div);

      row.appendChild(buildTaskCell(key, 'evening'));

      container.appendChild(row);
    });
  }

  function buildTaskCell(key, period) {
    const cell = document.createElement('div');
    cell.className = 'task-cell';
    const day = ensureDay(key);
    const list = day[period];

    list.forEach((_, i) => cell.appendChild(buildTaskRow(key, period, i)));

    const addBtn = document.createElement('button');
    addBtn.className = 'add-task';
    addBtn.textContent = list.length === 0 ? '+ add' : '+ another';
    addBtn.onclick = () => {
      day[period].push({ text: '', status: null });
      saveTasks();
      render();
      requestAnimationFrame(() => {
        const inputs = document.querySelectorAll(`.task-input[data-key="${key}"][data-period="${period}"]`);
        if (inputs.length) inputs[inputs.length - 1].focus();
      });
    };
    cell.appendChild(addBtn);
    return cell;
  }

  function buildTaskRow(key, period, index) {
    const task = tasksState[key][period][index];
    const wrap = document.createElement('div');
    wrap.className = 'task';
    if (task.status) wrap.classList.add('has-status');

    // INPUT (left) - textarea so it wraps and grows
    const input = document.createElement('textarea');
    input.className = 'task-input';
    input.rows = 1;
    if (task.status === 'yes') input.classList.add('done-yes');
    if (task.status === 'no') input.classList.add('done-no');
    input.value = task.text;
    input.dataset.key = key;
    input.dataset.period = period;

    const autosize = () => {
      input.style.height = 'auto';
      input.style.height = input.scrollHeight + 'px';
    };

    input.oninput = (e) => {
      task.text = e.target.value;
      autosize();
      saveTasks();
    };
    input.onkeydown = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        tasksState[key][period].push({ text: '', status: null });
        saveTasks();
        render();
        requestAnimationFrame(() => {
          const inputs = document.querySelectorAll(`.task-input[data-key="${key}"][data-period="${period}"]`);
          if (inputs.length) inputs[inputs.length - 1].focus();
        });
      } else if (e.key === 'Backspace' && task.text === '' && tasksState[key][period].length > 1) {
        e.preventDefault();
        tasksState[key][period].splice(index, 1);
        saveTasks();
        render();
      }
    };
    requestAnimationFrame(autosize);
    wrap.appendChild(input);

    // CHECK BUTTONS (right)
    const group = document.createElement('div');
    group.className = 'check-group';

    const yesBtn = document.createElement('button');
    yesBtn.className = 'check-btn' + (task.status === 'yes' ? ' yes' : '');
    yesBtn.textContent = '✓';
    yesBtn.title = 'Did it';
    yesBtn.onclick = () => {
      task.status = task.status === 'yes' ? null : 'yes';
      saveTasks();
      render();
    };

    const noBtn = document.createElement('button');
    noBtn.className = 'check-btn' + (task.status === 'no' ? ' no' : '');
    noBtn.textContent = '✕';
    noBtn.title = 'Did not';
    noBtn.onclick = () => {
      task.status = task.status === 'no' ? null : 'no';
      saveTasks();
      render();
    };

    group.appendChild(yesBtn);
    group.appendChild(noBtn);
    wrap.appendChild(group);

    // DELETE (far right)
    const del = document.createElement('button');
    del.className = 'delete-btn';
    del.innerHTML = '×';
    del.title = 'Remove task';
    del.onclick = () => {
      const preview = task.text.trim().length
        ? `Delete "${task.text.trim().slice(0, 30)}${task.text.trim().length > 30 ? '…' : ''}"?`
        : 'Delete this task?';
      showToast(preview, () => {
        tasksState[key][period].splice(index, 1);
        saveTasks();
        render();
      });
    };
    wrap.appendChild(del);

    return wrap;
  }

  // ===== Notepads (with two columns each) =====
  function makeBullet(text) {
    return { text: text || '', status: null };
  }

  function makeEmptyNotepad() {
    return {
      header: '',
      columns: [
        { bullets: [makeBullet('')] },
        { bullets: [makeBullet('')] }
      ]
    };
  }

  function ensureNotepadShape(n) {
    if (!n || typeof n !== 'object') return makeEmptyNotepad();
    if (typeof n.header !== 'string') n.header = '';
    if (!Array.isArray(n.columns)) {
      const oldBullets = Array.isArray(n.bullets) && n.bullets.length ? n.bullets : [''];
      n.columns = [
        { bullets: oldBullets },
        { bullets: [''] }
      ];
      delete n.bullets;
    }
    while (n.columns.length < 2) {
      n.columns.push({ bullets: [''] });
    }
    n.columns.forEach((c) => {
      // remove the no-longer-used label
      delete c.label;
      if (!Array.isArray(c.bullets) || c.bullets.length === 0) c.bullets = [makeBullet('')];
      // migrate string bullets to object bullets
      c.bullets = c.bullets.map(b => {
        if (typeof b === 'string') return makeBullet(b);
        if (b && typeof b === 'object') {
          if (typeof b.text !== 'string') b.text = '';
          if (b.status !== 'yes' && b.status !== 'no') b.status = null;
          return b;
        }
        return makeBullet('');
      });
    });
    return n;
  }

  function renderNotepads() {
    const grid = document.getElementById('notepads');
    grid.innerHTML = '';

    if (!Array.isArray(notepadsState)) notepadsState = [];
    if (notepadsState.length === 0) notepadsState.push(makeEmptyNotepad());

    notepadsState.forEach((rawNote, i) => {
      const note = ensureNotepadShape(rawNote);
      notepadsState[i] = note;

      const pad = document.createElement('div');
      pad.className = 'notepad';
      pad.dataset.noteIdx = i;

      // Drag handle (top-left)
      const dragHandle = document.createElement('button');
      dragHandle.className = 'notepad-drag';
      dragHandle.innerHTML = '⋮⋮';
      dragHandle.title = 'Drag to reorder';
      dragHandle.draggable = true;
      dragHandle.addEventListener('dragstart', (e) => {
        e.stopPropagation();
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('application/x-notepad-idx', String(i));
        // Drag the whole pad as the visual
        try { e.dataTransfer.setDragImage(pad, 20, 20); } catch (_) {}
        pad.classList.add('dragging');
      });
      dragHandle.addEventListener('dragend', () => {
        pad.classList.remove('dragging');
        document.querySelectorAll('.notepad.drag-over').forEach(el => el.classList.remove('drag-over'));
      });
      pad.appendChild(dragHandle);

      // Drop target: another pad
      pad.addEventListener('dragover', (e) => {
        const types = e.dataTransfer.types || [];
        if (Array.from(types).includes('application/x-notepad-idx')) {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          pad.classList.add('drag-over');
        }
      });
      pad.addEventListener('dragleave', (e) => {
        // Only remove if leaving to a non-child
        if (!pad.contains(e.relatedTarget)) {
          pad.classList.remove('drag-over');
        }
      });
      pad.addEventListener('drop', (e) => {
        const fromIdx = parseInt(e.dataTransfer.getData('application/x-notepad-idx'), 10);
        if (isNaN(fromIdx) || fromIdx === i) return;
        e.preventDefault();
        const targetIdx = i;
        const [moved] = notepadsState.splice(fromIdx, 1);
        // Insert before target if moving from later, after if moving from earlier
        const insertAt = fromIdx < targetIdx ? targetIdx : targetIdx;
        notepadsState.splice(insertAt, 0, moved);
        saveNotepads();
        renderNotepads();
      });

      // Remove block button
      const removeBtn = document.createElement('button');
      removeBtn.className = 'notepad-remove';
      removeBtn.innerHTML = '×';
      removeBtn.title = 'Remove this block';
      removeBtn.onclick = (e) => {
        e.stopPropagation();
        showToast('Remove this block and its contents?', () => {
          notepadsState.splice(i, 1);
          saveNotepads();
          renderNotepads();
        });
      };
      pad.appendChild(removeBtn);

      // Header
      const header = document.createElement('input');
      header.type = 'text';
      header.className = 'notepad-header';
      header.placeholder = 'Category';
      header.value = note.header;
      header.oninput = (e) => {
        note.header = e.target.value;
        saveNotepads();
      };
      pad.appendChild(header);

      // Two-column body
      const body = document.createElement('div');
      body.className = 'notepad-body';

      body.appendChild(buildNotepadColumn(i, 0));

      const colDiv = document.createElement('div');
      colDiv.className = 'notepad-col-divider';
      body.appendChild(colDiv);

      body.appendChild(buildNotepadColumn(i, 1));

      pad.appendChild(body);

      grid.appendChild(pad);
    });
  }

  function buildNotepadColumn(noteIdx, colIdx) {
    const col = notepadsState[noteIdx].columns[colIdx];
    const wrap = document.createElement('div');
    wrap.className = 'notepad-col';
    wrap.dataset.noteIdx = noteIdx;
    wrap.dataset.colIdx = colIdx;

    // Column-level drop target (for dropping past the last bullet, or into empty columns)
    wrap.addEventListener('dragover', (e) => {
      const types = e.dataTransfer.types || [];
      if (!Array.from(types).includes('application/x-bullet')) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      // Only show empty highlight if not over a specific bullet
      const overBullet = e.target.closest && e.target.closest('.bullet');
      if (!overBullet) {
        wrap.classList.add('drag-over-empty');
      } else {
        wrap.classList.remove('drag-over-empty');
      }
    });
    wrap.addEventListener('dragleave', (e) => {
      if (!wrap.contains(e.relatedTarget)) {
        wrap.classList.remove('drag-over-empty');
      }
    });
    wrap.addEventListener('drop', (e) => {
      // Bail if a bullet handler already took it
      if (e.defaultPrevented) return;
      const raw = e.dataTransfer.getData('application/x-bullet');
      if (!raw) return;
      e.preventDefault();
      wrap.classList.remove('drag-over-empty');
      const src = JSON.parse(raw);
      // Drop at end of this column
      const lastIdx = col.bullets.length - 1;
      moveBullet(src, { noteIdx, colIdx, bulletIdx: Math.max(0, lastIdx), insertAfter: true });
    });

    const bulletsWrap = document.createElement('div');
    bulletsWrap.className = 'notepad-bullets';
    col.bullets.forEach((_, bi) => bulletsWrap.appendChild(buildBullet(noteIdx, colIdx, bi)));
    wrap.appendChild(bulletsWrap);

    const addBtn = document.createElement('button');
    addBtn.className = 'add-bullet';
    addBtn.textContent = '+ add';
    addBtn.onclick = () => {
      col.bullets.push(makeBullet(''));
      saveNotepads();
      renderNotepads();
      requestAnimationFrame(() => {
        const grid = document.getElementById('notepads');
        const pads = grid.querySelectorAll('.notepad');
        const cols = pads[noteIdx].querySelectorAll('.notepad-col');
        const inputs = cols[colIdx].querySelectorAll('.bullet-input');
        if (inputs.length) inputs[inputs.length - 1].focus();
      });
    };
    wrap.appendChild(addBtn);

    return wrap;
  }

  function buildBullet(noteIdx, colIdx, bulletIdx) {
    const col = notepadsState[noteIdx].columns[colIdx];
    const bullet = col.bullets[bulletIdx];
    const wrap = document.createElement('div');
    wrap.className = 'bullet';
    wrap.dataset.noteIdx = noteIdx;
    wrap.dataset.colIdx = colIdx;
    wrap.dataset.bulletIdx = bulletIdx;
    if (bullet.status) wrap.classList.add('has-status');

    // Drag handle (replaces the dot marker visually on hover)
    const dragHandle = document.createElement('span');
    dragHandle.className = 'bullet-drag bullet-marker';
    dragHandle.textContent = '⋮';
    dragHandle.title = 'Drag to move';
    dragHandle.draggable = true;
    dragHandle.addEventListener('dragstart', (e) => {
      e.stopPropagation();
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('application/x-bullet', JSON.stringify({ noteIdx, colIdx, bulletIdx }));
      try { e.dataTransfer.setDragImage(wrap, 20, 10); } catch (_) {}
      wrap.classList.add('dragging');
    });
    dragHandle.addEventListener('dragend', () => {
      wrap.classList.remove('dragging');
      document.querySelectorAll('.bullet.drag-over-top, .bullet.drag-over-bottom')
        .forEach(el => el.classList.remove('drag-over-top', 'drag-over-bottom'));
      document.querySelectorAll('.notepad-col.drag-over-empty')
        .forEach(el => el.classList.remove('drag-over-empty'));
    });
    wrap.appendChild(dragHandle);

    // Bullet-level drag-over to insert above or below
    wrap.addEventListener('dragover', (e) => {
      const types = e.dataTransfer.types || [];
      if (!Array.from(types).includes('application/x-bullet')) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const rect = wrap.getBoundingClientRect();
      const midY = rect.top + rect.height / 2;
      wrap.classList.toggle('drag-over-top', e.clientY < midY);
      wrap.classList.toggle('drag-over-bottom', e.clientY >= midY);
    });
    wrap.addEventListener('dragleave', () => {
      wrap.classList.remove('drag-over-top', 'drag-over-bottom');
    });
    wrap.addEventListener('drop', (e) => {
      const raw = e.dataTransfer.getData('application/x-bullet');
      if (!raw) return;
      e.preventDefault();
      e.stopPropagation();
      const src = JSON.parse(raw);
      const rect = wrap.getBoundingClientRect();
      const insertAfter = e.clientY >= rect.top + rect.height / 2;
      moveBullet(src, { noteIdx, colIdx, bulletIdx, insertAfter });
    });

    const input = document.createElement('textarea');
    input.className = 'bullet-input';
    if (bullet.status === 'yes') input.classList.add('done-yes');
    if (bullet.status === 'no') input.classList.add('done-no');
    input.rows = 1;
    input.value = bullet.text;

    const autosize = () => {
      input.style.height = 'auto';
      input.style.height = input.scrollHeight + 'px';
    };
    input.oninput = (e) => {
      bullet.text = e.target.value;
      autosize();
      saveNotepads();
    };
    input.onkeydown = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        col.bullets.splice(bulletIdx + 1, 0, makeBullet(''));
        saveNotepads();
        renderNotepads();
        requestAnimationFrame(() => {
          const grid = document.getElementById('notepads');
          const pads = grid.querySelectorAll('.notepad');
          const cols = pads[noteIdx].querySelectorAll('.notepad-col');
          const inputs = cols[colIdx].querySelectorAll('.bullet-input');
          if (inputs[bulletIdx + 1]) inputs[bulletIdx + 1].focus();
        });
      } else if (e.key === 'Backspace' && input.value === '' && col.bullets.length > 1) {
        e.preventDefault();
        col.bullets.splice(bulletIdx, 1);
        saveNotepads();
        renderNotepads();
        requestAnimationFrame(() => {
          const grid = document.getElementById('notepads');
          const pads = grid.querySelectorAll('.notepad');
          const cols = pads[noteIdx].querySelectorAll('.notepad-col');
          const inputs = cols[colIdx].querySelectorAll('.bullet-input');
          const target = inputs[Math.max(0, bulletIdx - 1)];
          if (target) {
            target.focus();
            target.setSelectionRange(target.value.length, target.value.length);
          }
        });
      }
    };
    requestAnimationFrame(autosize);
    wrap.appendChild(input);

    // Check / X buttons (hover-reveal)
    const checks = document.createElement('div');
    checks.className = 'bullet-checks';

    const yesBtn = document.createElement('button');
    yesBtn.className = 'bullet-check' + (bullet.status === 'yes' ? ' yes' : '');
    yesBtn.textContent = '✓';
    yesBtn.title = 'Did it';
    yesBtn.onclick = () => {
      bullet.status = bullet.status === 'yes' ? null : 'yes';
      saveNotepads();
      renderNotepads();
    };

    const noBtn = document.createElement('button');
    noBtn.className = 'bullet-check' + (bullet.status === 'no' ? ' no' : '');
    noBtn.textContent = '✕';
    noBtn.title = 'Did not';
    noBtn.onclick = () => {
      bullet.status = bullet.status === 'no' ? null : 'no';
      saveNotepads();
      renderNotepads();
    };

    checks.appendChild(yesBtn);
    checks.appendChild(noBtn);
    wrap.appendChild(checks);

    const del = document.createElement('button');
    del.className = 'bullet-delete';
    del.innerHTML = '×';
    del.title = 'Remove';
    del.onclick = () => {
      const doDelete = () => {
        if (col.bullets.length > 1) {
          col.bullets.splice(bulletIdx, 1);
        } else {
          col.bullets[0] = makeBullet('');
        }
        saveNotepads();
        renderNotepads();
      };
      const text = (bullet.text || '').trim();
      if (!text) {
        doDelete();
      } else {
        const preview = `Delete "${text.slice(0, 30)}${text.length > 30 ? '…' : ''}"?`;
        showToast(preview, doDelete);
      }
    };
    wrap.appendChild(del);

    return wrap;
  }

  // Move a bullet from src position to target position (handles cross-column/cross-block)
  function moveBullet(src, target) {
    const srcCol = notepadsState[src.noteIdx].columns[src.colIdx];
    const movedBullet = srcCol.bullets[src.bulletIdx];
    if (!movedBullet) return;

    // Remove from source first
    srcCol.bullets.splice(src.bulletIdx, 1);

    // Recompute target index if same column and source was before target
    let targetBulletIdx = target.bulletIdx;
    if (src.noteIdx === target.noteIdx && src.colIdx === target.colIdx && src.bulletIdx < target.bulletIdx) {
      targetBulletIdx = target.bulletIdx - 1;
    }

    const insertAt = target.insertAfter ? targetBulletIdx + 1 : targetBulletIdx;
    const targetCol = notepadsState[target.noteIdx].columns[target.colIdx];
    targetCol.bullets.splice(insertAt, 0, movedBullet);

    // If source column is now empty, leave one empty bullet placeholder
    if (srcCol.bullets.length === 0) {
      srcCol.bullets.push(makeBullet(''));
    }

    saveNotepads();
    renderNotepads();
  }

  // ===== Toast confirm =====
  let toastConfirmFn = null;
  const toast = document.getElementById('toast');
  const toastMsg = document.getElementById('toastMsg');
  const toastConfirmBtn = document.getElementById('toastConfirm');
  const toastCancelBtn = document.getElementById('toastCancel');

  function showToast(message, onConfirm) {
    toastMsg.textContent = message;
    toastConfirmFn = onConfirm;
    toast.classList.add('show');
  }
  function hideToast() {
    toast.classList.remove('show');
    toastConfirmFn = null;
  }
  toastConfirmBtn.onclick = () => {
    if (toastConfirmFn) toastConfirmFn();
    hideToast();
  };
  toastCancelBtn.onclick = hideToast;

  // ===== Touch drag fallback (iOS doesn't support HTML5 drag-and-drop) =====
  let touchDrag = null; // { type: 'bullet'|'notepad', src, ghost, lastTarget }

  function startTouchDrag(type, src, sourceEl, touch) {
    // Create a visual ghost
    const rect = sourceEl.getBoundingClientRect();
    const ghost = sourceEl.cloneNode(true);
    ghost.style.position = 'fixed';
    ghost.style.left = rect.left + 'px';
    ghost.style.top = rect.top + 'px';
    ghost.style.width = rect.width + 'px';
    ghost.style.pointerEvents = 'none';
    ghost.style.opacity = '0.7';
    ghost.style.zIndex = '1000';
    ghost.style.transform = 'rotate(1deg)';
    ghost.style.boxShadow = '0 8px 24px rgba(0,0,0,0.15)';
    document.body.appendChild(ghost);

    sourceEl.classList.add('dragging');
    touchDrag = {
      type, src, ghost, sourceEl,
      offsetX: touch.clientX - rect.left,
      offsetY: touch.clientY - rect.top,
      lastTarget: null,
    };
  }

  function moveTouchDrag(touch) {
    if (!touchDrag) return;
    touchDrag.ghost.style.left = (touch.clientX - touchDrag.offsetX) + 'px';
    touchDrag.ghost.style.top = (touch.clientY - touchDrag.offsetY) + 'px';

    // Find element under the touch point
    touchDrag.ghost.style.display = 'none';
    const elBelow = document.elementFromPoint(touch.clientX, touch.clientY);
    touchDrag.ghost.style.display = '';

    // Clear previous highlight
    document.querySelectorAll('.notepad.drag-over, .bullet.drag-over-top, .bullet.drag-over-bottom, .notepad-col.drag-over-empty')
      .forEach(el => el.classList.remove('drag-over', 'drag-over-top', 'drag-over-bottom', 'drag-over-empty'));

    if (!elBelow) {
      touchDrag.lastTarget = null;
      return;
    }

    if (touchDrag.type === 'notepad') {
      const targetPad = elBelow.closest('.notepad');
      if (targetPad && targetPad !== touchDrag.sourceEl) {
        targetPad.classList.add('drag-over');
        touchDrag.lastTarget = { kind: 'notepad', el: targetPad };
      } else {
        touchDrag.lastTarget = null;
      }
    } else if (touchDrag.type === 'bullet') {
      const targetBullet = elBelow.closest('.bullet');
      if (targetBullet && targetBullet !== touchDrag.sourceEl) {
        const r = targetBullet.getBoundingClientRect();
        const insertAfter = touch.clientY >= r.top + r.height / 2;
        targetBullet.classList.add(insertAfter ? 'drag-over-bottom' : 'drag-over-top');
        touchDrag.lastTarget = { kind: 'bullet', el: targetBullet, insertAfter };
      } else {
        const targetCol = elBelow.closest('.notepad-col');
        if (targetCol) {
          targetCol.classList.add('drag-over-empty');
          touchDrag.lastTarget = { kind: 'col', el: targetCol };
        } else {
          touchDrag.lastTarget = null;
        }
      }
    }
  }

  function endTouchDrag() {
    if (!touchDrag) return;
    const { type, src, lastTarget, ghost, sourceEl } = touchDrag;
    ghost.remove();
    sourceEl.classList.remove('dragging');
    document.querySelectorAll('.notepad.drag-over, .bullet.drag-over-top, .bullet.drag-over-bottom, .notepad-col.drag-over-empty')
      .forEach(el => el.classList.remove('drag-over', 'drag-over-top', 'drag-over-bottom', 'drag-over-empty'));

    if (lastTarget) {
      if (type === 'notepad' && lastTarget.kind === 'notepad') {
        const fromIdx = src;
        const targetIdx = parseInt(lastTarget.el.dataset.noteIdx, 10);
        if (!isNaN(targetIdx) && targetIdx !== fromIdx) {
          const [moved] = notepadsState.splice(fromIdx, 1);
          notepadsState.splice(targetIdx, 0, moved);
          saveNotepads();
          renderNotepads();
        }
      } else if (type === 'bullet') {
        if (lastTarget.kind === 'bullet') {
          const targetEl = lastTarget.el;
          moveBullet(src, {
            noteIdx: parseInt(targetEl.dataset.noteIdx, 10),
            colIdx: parseInt(targetEl.dataset.colIdx, 10),
            bulletIdx: parseInt(targetEl.dataset.bulletIdx, 10),
            insertAfter: lastTarget.insertAfter,
          });
        } else if (lastTarget.kind === 'col') {
          const targetCol = lastTarget.el;
          const noteIdx = parseInt(targetCol.dataset.noteIdx, 10);
          const colIdx = parseInt(targetCol.dataset.colIdx, 10);
          const lastIdx = notepadsState[noteIdx].columns[colIdx].bullets.length - 1;
          moveBullet(src, { noteIdx, colIdx, bulletIdx: Math.max(0, lastIdx), insertAfter: true });
        }
      }
    }
    touchDrag = null;
  }

  // Wire touch events on the page (delegated)
  document.addEventListener('touchstart', (e) => {
    const handle = e.target.closest('.notepad-drag, .bullet-drag');
    if (!handle) return;
    const touch = e.touches[0];
    if (handle.classList.contains('notepad-drag')) {
      const pad = handle.closest('.notepad');
      const idx = parseInt(pad.dataset.noteIdx, 10);
      e.preventDefault();
      startTouchDrag('notepad', idx, pad, touch);
    } else if (handle.classList.contains('bullet-drag')) {
      const bullet = handle.closest('.bullet');
      const src = {
        noteIdx: parseInt(bullet.dataset.noteIdx, 10),
        colIdx: parseInt(bullet.dataset.colIdx, 10),
        bulletIdx: parseInt(bullet.dataset.bulletIdx, 10),
      };
      e.preventDefault();
      startTouchDrag('bullet', src, bullet, touch);
    }
  }, { passive: false });

  document.addEventListener('touchmove', (e) => {
    if (!touchDrag) return;
    e.preventDefault();
    moveTouchDrag(e.touches[0]);
  }, { passive: false });

  document.addEventListener('touchend', () => {
    endTouchDrag();
  });
  document.addEventListener('touchcancel', () => {
    endTouchDrag();
  });

  // ===== Init =====
  document.getElementById('prevWeeks').onclick = () => shiftWeeks(-1);
  document.getElementById('nextWeeks').onclick = () => shiftWeeks(1);
  document.getElementById('goToday').onclick = () => {
    anchorMonday = startOfWeek(new Date());
    render();
  };
  document.getElementById('addNotepad').onclick = () => {
    if (!Array.isArray(notepadsState)) notepadsState = [];
    notepadsState.push(makeEmptyNotepad());
    saveNotepads();
    renderNotepads();
    requestAnimationFrame(() => {
      const grid = document.getElementById('notepads');
      const pads = grid.querySelectorAll('.notepad');
      const last = pads[pads.length - 1];
      if (last) {
        last.scrollIntoView({ behavior: 'smooth', block: 'center' });
        const h = last.querySelector('.notepad-header');
        if (h) h.focus();
      }
    });
  };

  const todayStr = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  document.getElementById('footerText').textContent = `saved automatically · ${todayStr.toLowerCase()}`;
  document.getElementById('refreshBtn').onclick = forceRefresh;

  (async function init() {
    tasksState = await loadData(STORAGE_KEY_TASKS, {});

    let loaded = await loadData(STORAGE_KEY_NOTEPADS, null);
    if (!loaded) {
      // Try previous versions
      let legacy = await loadData('planner.notepads.v2', null);
      if (!legacy) legacy = await loadData('planner.notepads.v1', null);
      if (legacy) {
        const arr = Array.isArray(legacy) ? legacy : Object.values(legacy);
        loaded = arr.map(ensureNotepadShape);
      }
    }
    if (Array.isArray(loaded) && loaded.length > 0) {
      notepadsState = loaded.map(ensureNotepadShape);
    } else {
      notepadsState = Array.from({ length: 6 }, makeEmptyNotepad);
    }
    render();
    renderNotepads();
  })();
</script>
</body>
</html>
